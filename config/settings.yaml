# =====================================================================
#  Parameter STRATEGI & RISIKO (bukan secret — boleh di-commit).
#  Secret (private key, API key) ada di .env, BUKAN di sini.
# =====================================================================

meta:
  bot_name: "atlas-poly"
  # Hipotesis edge aktif — harus cocok dengan prompts/01_EDGE_HYPOTHESIS.md
  active_edge: "cross_market_arb"   # opsi: stale_pricing | cross_market_arb | longshot_bias | fundamental_model
  domain: "politics"                # LOCKED 2026-06-04: fokus market politik
  observation_window_days: 14

# --- RISK LIMITS (hard caps; strategi TIDAK boleh meng-override) ---
risk:
  kelly_fraction: 0.25          # quarter-Kelly. Jangan naikkan tanpa bukti.
  max_per_trade_pct: 0.02       # maks 2% modal per posisi
  max_per_market_pct: 0.05      # maks 5% modal per market
  max_open_positions: 5
  daily_loss_limit_pct: 0.10    # kill-switch: stop kalau rugi >10%/hari
  # liquidity gate diselaraskan dgn per_trade cap: dgn bankroll $1000 & cap 2%,
  # notional maks per trade = $20, jadi gate $50 akan memblokir SEMUA trade.
  # Diturunkan ke $15 agar konsisten (paper). Naikkan lagi saat bankroll besar.
  min_orderbook_depth_usd: 15   # liquidity gate (selaras dgn per_trade cap)
  resolution_buffer_minutes: 30 # jangan buka posisi <30 menit sebelum resolve

# --- EDGE / SINYAL ---
edge:
  min_edge_threshold: 0.05      # |P_model - P_market| minimal untuk trade
  max_spread_pct: 0.04          # skip market dengan spread terlalu lebar

# --- STRATEGI (multi-method; aktif/nonaktif tiap strategi) ---
strategies:
  arbitrage:
    enabled: true
  longshot_bias:                # fade longshot yang overpriced (favorite-longshot bias)
    enabled: true
    longshot_cutoff: 0.08       # harga YES <= ini dianggap "longshot"
    shrink_factor: 0.6          # model_prob = price * shrink (longshot cenderung overpriced)
  mean_reversion:               # harga bergerak jauh dari rata-rata jangka pendek -> reversi
    enabled: true
    lookback: 10                # jumlah snapshot untuk baseline
    deviation_threshold: 0.06   # simpangan dari baseline untuk memicu sinyal

# --- MULTI-VENUE (selain Polymarket) ---
venues:
  polymarket:
    enabled: true
  manifold:                     # API publik gratis (https://api.manifold.markets)
    enabled: true
  kalshi:                       # butuh API key (.env) untuk data penuh
    enabled: false
cross_venue:
  enabled: true
  match_threshold: 0.82         # kemiripan teks pertanyaan untuk dianggap market sama
  min_discrepancy: 0.05         # selisih probabilitas antar-venue untuk sinyal
  # CATATAN: cross-venue BUKAN riskless (settlement/timing beda) -> sinyal/analitik, bukan auto-exec

# --- EKSEKUSI ---
execution:
  order_type: "limit"           # limit-only untuk kontrol slippage
  max_slippage_pct: 0.01
  retry_attempts: 3
  retry_backoff_seconds: 2

# --- BACKTEST ---
backtest:
  monte_carlo_paths: 5000
  walk_forward_train_pct: 0.6
  cost_model:
    gas_usd_per_tx: 0.02
    assumed_slippage_pct: 0.005

# --- PAPER TRADING ---
paper:
  starting_balance_usd: 1000    # uang palsu untuk simulasi
  min_run_days: 14              # minimal sebelum dianggap valid

# --- LOGGING ---
logging:
  level: "INFO"
  audit_trail: true             # catat alasan tiap keputusan trade
